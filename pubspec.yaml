name: q_bank
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1
dependencies:
  bloc: ^9.1.0
  bloc_concurrency: ^0.3.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  country_picker: ^2.0.27
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  diffutil_sliverlist: ^0.5.1
  dio: ^5.9.0
  dots_indicator: ^4.0.1
  dropdown_button2: ^2.3.9
  equatable: ^2.0.7
  firebase_analytics: ^12.0.4
  firebase_core: ^4.2.1
  firebase_crashlytics: ^5.0.5
  fl_chart: ^1.2.0
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_card_swiper: ^7.2.0
  flutter_hooks: ^0.21.3+1
  flutter_image_compress: ^2.4.0
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.2.3
  fluttertoast: ^9.0.0
  get_it: ^9.2.0
  go_router: ^17.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hydrated_bloc: ^10.1.1
  image: ^4.5.4
  image_picker: ^1.2.1
  in_app_review: ^2.0.11
  injectable: ^2.7.1+2
  intl: ^0.20.2
  loader_overlay: ^5.0.0
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  skeletonizer: ^2.1.1
  stream_transform: ^2.1.1
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.10.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.11.1

flutter:

  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
    - assets/icons/
    - assets/icons/svg/
    - assets/images/
    - assets/images/svg/
    - assets/images/svg/onboarding/
    - assets/music/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
